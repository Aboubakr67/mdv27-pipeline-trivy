# --------------------------- MA PIPELINE -------------------------------------

name: Trivy Scan Node.js

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image Node.js
        run: docker pull node:alpine

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: node:alpine
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          format: table




